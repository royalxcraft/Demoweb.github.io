<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio Demo</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header>
    <nav>
      <h1>MyPortfolio</h1>
      <ul>
        <li><a href="#hero">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section id="hero">
    <div class="hero-content">
      <h2>Hi, I'm Royal</h2>
      <p>Web Developer & Designer</p>
      <button onclick="scrollToProjects()">See my work</button>
    </div>
  </section>

  <section id="about">
    <h2>About Me</h2>
    <p>
      I create interactive websites and love bringing ideas to life with code. I'm passionate about design, functionality, and clean code.
    </p>
  </section>

  <section id="projects">
    <h2>Projects</h2>
    <div class="project-list" id="project-list">
      <!-- Projects inserted by JavaScript -->
    </div>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <form>
      <input type="text" placeholder="Your Name" required/>
      <input type="email" placeholder="Your Email" required/>
      <textarea placeholder="Message" required></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 Royal | Demo Portfolio</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
